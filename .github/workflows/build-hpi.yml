name: build-hpi

# Manuell auslösbarer Build, der die fertige .hpi als Download-Artifact bereitstellt.
# Enthält den Fix für #1259 (BuildCulpritsRetriever cast WorkflowRun <-> AbstractBuild).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin-Version (changelist) der gebauten HPI"
        required: true
        default: "1099-fix1259cast"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build HPI (skip tests)
        run: mvn -B -ntp -DskipTests -Dchangelist=${{ inputs.version }} clean package

      - name: Liste der Build-Artefakte
        run: ls -la target/*.hpi target/*.jpi 2>/dev/null || true

      - name: Upload HPI
        uses: actions/upload-artifact@v4
        with:
          name: build-monitor-${{ inputs.version }}-hpi
          path: |
            target/*.hpi
          if-no-files-found: error
          retention-days: 30
